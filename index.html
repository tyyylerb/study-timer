<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Sniglet:wght@400;800&display=swap" rel="stylesheet">
    <title>Study Timer</title>
</head>
<body>

    <img src="media/giphy.gif" alt="woman with a cat on a balcony" id="bg-video">

    <div class="nav-container">
        <nav>
            <input type="checkbox" id="nav" class="hidden">
            <label for="nav" class="nav-btn">
                <i></i>
                <i></i>
                <i></i>
            </label>
            <div class="nav-wrapper">
                <ul>
                    <li><a href="index.html">Timer</a></li>
                    <li><a href="animals.html">Animals</a></li>
                    <li><a href="other.html">Other</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="content">
        <h1>time to study!</h1>
    </div>

    <div class="container">
        <div class="content">
            <span id="message"></span>
            <div id="time">
                <span class="digit" id="hr">
                    00</span>
                <span class="txt">Hr</span>
                <span class="digit" id="min">
                    00</span>
                <span class="txt">Min</span>
                <span class="digit" id="sec">
                    00</span>
                <span class="txt">Sec</span>
                <span class="digit" id="count">
                    00</span>
            </div>
            <div id="buttons">
                <button class="btn" id="start">
                    Start</button>
                <button class="btn" id="stop">
                    Stop</button>
                <button class="btn" id="reset">
                    Reset</button>
            </div>
        </div>
    </div>

    <script src="scripts/time.js"></script>
    <script src="scripts/messages.js"></script>

    <footer>
        <p>Copyright 2026 Tyler Brown</p>
    </footer>
</body>
